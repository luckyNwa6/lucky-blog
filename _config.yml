# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: 小维 · 博客园
subtitle: ''
description: ''
keywords: 'Java,MySQL,代码,博客,Butterfly,Hexo'
author: Lucky小维
language: zh-CN
timezone: 'Asia/Shanghai'

# URL
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'
# 改动的地方
url: https://luckynwa.top
root: /
#permalink: :year/:month/:day/:title/
permalink: posts/:abbrlink/
abbrlink:
  alg: crc32 # 算法：crc16(default) and crc32
  rep: hex # 进制：dec(default) and hex
permalink_defaults:
pretty_urls:
  trailing_index: true # Set to false to remove trailing 'index.html' from permalinks
  trailing_html: true # Set to false to remove trailing '.html' from permalinks
# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:
  - 404.html
  - googlee2a292c45f2bba42.html
  - linksmessage.html
  - people.html
  - noie.html
  - config.yaml
# hexo-admin authentification
admin:
  username: luckyNwa
  password_hash: $2a$10$8hX8N9xUIZ620QZF.vyizurma6ylRUUc8xkeuvxuR14y5t8GbF2me
  secret: lucky
  deployCommand: '/admin_script.bat'

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: '    '
  wrap: true
  hljs: false
prismjs:
  enable: false
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 20
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## https://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
updated_option: 'mtime'

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include:
exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: acryple
search:
  path: search.xml
  field: post # post:文章范围、page:页面范围、all:覆盖所有
  content: true # 内容是否包含每一篇文章的全部内容
  template: # ./search.xml 指定定制的XML模板

deploy:
  - type: git
    repo: git@github.com:luckyNwa/luckyNwa.github.io.git
    branch: main
  # 看板娘
live2d:
  enable: false
  scriptFrom: local
  pluginRootPath: live2dw/
  pluginJsPath: lib/
  pluginModelPath: assets/
  tagMode: false
  debug: false
  model:
    use: live2d-widget-model-hibiki
  display:
    position: left
    width: 150
    height: 520
  mobile:
    show: false
symbols_count_time:
  symbols: true
  time: true
  total_symbols: true
  total_time: true
# # hexo-filter-gitcalendar
# # see https://akilar.top/posts/1f9c68c9/
# calendar:
#   single: true
#   root: calendar/

# # hexo-butterfly-swiper
# # see https://akilar.top/posts/8e1264d1/
swiper:
  enable: true # 开关
  priority: 5 # 过滤器优先权
  enable_page: all # 应用页面
  timemode: date # date/updated
  layout: # 挂载容器类型
    type: class
    name: swiper-div
    index: 0
  default_descr: 再怎么看我也不知道怎么描述它的啦！
  swiper_css: https://imgs.luckynwa.top/profile/blog/jscss/swiper.min.css
  swiper_js: https://imgs.luckynwa.top/profile/blog/jscss/swiper.min.js
  custom_css: https://imgs.luckynwa.top/profile/blog/jscss/swiperstyle.css
  custom_js: https://imgs.luckynwa.top/profile/blog/jscss/swiper_init.js
  error_img: https://imgs.luckynwa.top/profile/blog/loading.gif
butterfly_article_double_row:
  enable: false
nofollow:
  enable: true
  field: site

